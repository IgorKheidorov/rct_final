services:
  - type: web
    name: frkt-bsu
    env: static
    buildCommand: pnpm install --frozen-lockfile && pnpm build:full
    staticPublishPath: out
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 20
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /pagefind/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
